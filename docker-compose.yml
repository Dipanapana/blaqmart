version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: blaqmart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: blaqmart
      POSTGRES_PASSWORD: blaqmart123
      POSTGRES_DB: blaqmart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blaqmart -d blaqmart"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
